replicaCount: 1

image:
  repository: ghcr.io/vitistack/kubevirt-status-page
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Kubernetes context to use (leave empty to use in-cluster config)
kubeContext: ""

# External kubeconfig provided via a Kubernetes secret.
# The secret must contain a key with the kubeconfig file content.
# When set, the application uses this kubeconfig instead of in-cluster config.
kubeconfig:
  # Name of an existing secret containing the kubeconfig
  secretName: ""
  # Key within the secret that holds the kubeconfig data
  secretKey: "kubeconfig"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000
  runAsGroup: 2000
  runAsUser: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: status.example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Multi-datacenter mode.
# Agent mode (default): queries local k8s and serves local dashboard.
# Hub mode: receives reports from agents and serves combined dashboard.
hub:
  # Set to true to run as hub (no k8s access needed)
  enabled: false
  # Shared secret for agent→hub authentication (required when enabled)
  token: ""
  # Existing secret containing the hub token (key: "token")
  existingSecret: ""

# Agent settings (only used when hub.enabled=false)
agent:
  # Name of this datacenter (shown in hub dashboard)
  datacenterName: ""
  # URL of the central hub (e.g. https://hub.example.com). Leave empty to disable push.
  hubURL: ""
  # Shared token for authenticating with the hub
  hubToken: ""
  # Existing secret containing the hub token (key: "token")
  hubTokenSecret: ""

nodeSelector: {}
tolerations: []
affinity: {}
