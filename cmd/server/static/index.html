<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeVirt Status Page</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/topology.css">
</head>
<body>
    <header>
        <h1>KubeVirt Cluster Status</h1>
        <nav class="nav-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/topology.html">Topology</a>
        </nav>
        <span id="updated" class="updated"></span>
        <span id="connection-status" class="connection-badge disconnected">Disconnected</span>
    </header>

    <main>
        <!-- Overview summary -->
        <section id="overview-section"></section>

        <!-- Node allocation charts -->
        <section id="charts-section">
            <h2>Node Resource Allocation</h2>
            <div class="chart-box chart-box-wide">
                <canvas id="combo-chart"></canvas>
            </div>
        </section>

        <!-- Nodes with VMs -->
        <section id="nodes-section">
            <h2>Nodes &amp; Virtual Machines</h2>
            <div id="nodes-container" class="nodes-grid"></div>
        </section>

        <!-- Cluster groups -->
        <section id="clusters-section">
            <h2>Clusters</h2>
            <div id="clusters-container" class="clusters-grid"></div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
